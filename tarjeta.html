<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alkaranta Finanzas</title>

<!-- ============================================= -->
<!-- META TAGS PARA VISTA PREVIA (Open Graph)        -->
<!-- Esto es lo que hace que WhatsApp/Instagram/Mail -->
<!-- muestren una tarjeta con imagen en vez de un     -->
<!-- link de texto plano.                             -->
<!--                                                   -->
<!-- IMPORTANTE: reemplazá las dos URLs de abajo       -->
<!-- (og:url y og:image) por tus URLs reales una vez   -->
<!-- que subas este archivo y la imagen a GitHub.      -->
<!-- ============================================= -->
<meta property="og:type" content="website">
<meta property="og:title" content="Alkaranta Finanzas">
<meta property="og:description" content="Controlá tus ingresos, egresos, presupuestos y metas de ahorro en un solo lugar.">
<meta property="og:image" content="https://alkaranta-ai.github.io/Alkaranta-Finanzas/preview.png">
<meta property="og:url" content="https://alkaranta-ai.github.io/Alkaranta-Finanzas/tarjeta.html">

<!-- Twitter/X usa estas mismas, por si comparten ahí -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Alkaranta Finanzas">
<meta name="twitter:description" content="Controlá tus ingresos, egresos, presupuestos y metas de ahorro en un solo lugar.">
<meta name="twitter:image" content="https://alkaranta-ai.github.io/Alkaranta-Finanzas/preview.png">

<style>
  :root{
    --teal-deep:#0B3D3A;
    --teal:#0D9488;
    --mint:#5EEAD4;
    --cream:#F6F8F7;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--cream);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .card{
    position:relative;
    width:min(92vw, 380px);
    padding:36px 30px 32px;
    background:linear-gradient(165deg, var(--teal-deep) 0%, var(--teal) 100%);
    border-radius:28px;
    color:#fff;
    text-decoration:none;
    display:block;
    box-shadow:0 18px 40px -12px rgba(11,61,58,0.45), 0 2px 8px rgba(11,61,58,0.18);
    transform:translateY(0) scale(1);
    transition:transform 180ms ease, box-shadow 180ms ease;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
  }

  .card:active{
    transform:translateY(2px) scale(0.98);
    box-shadow:0 10px 24px -10px rgba(11,61,58,0.5), 0 1px 4px rgba(11,61,58,0.2);
  }

  .glow{
    position:absolute;
    top:-60px;
    right:-60px;
    width:200px;
    height:200px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(94,234,212,0.35) 0%, rgba(94,234,212,0) 70%);
    pointer-events:none;
  }

  .icon-badge{
    width:60px;
    height:60px;
    border-radius:18px;
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:22px;
  }

  .icon-badge svg{
    width:30px;
    height:30px;
  }

  .eyebrow{
    font-size:12px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--mint);
    margin:0 0 6px;
  }

  .title{
    font-size:25px;
    font-weight:700;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }

  .title em{
    font-style:normal;
    font-weight:400;
    opacity:0.85;
  }

  .desc{
    font-size:14.5px;
    line-height:1.5;
    color:rgba(255,255,255,0.78);
    margin:0 0 26px;
    max-width:280px;
  }

  .cta-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:1px solid rgba(255,255,255,0.16);
    padding-top:18px;
  }

  .cta-text{
    font-size:15px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .arrow-circle{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#fff;
    color:var(--teal-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:transform 180ms ease;
  }

  .card:active .arrow-circle{
    transform:translateX(3px);
  }

  .hint{
    text-align:center;
    font-size:12px;
    color:#6B7C7A;
    margin-top:16px;
    letter-spacing:0.01em;
  }
</style>
</head>
<body>

<div>
  <a class="card" id="appCard" href="https://alkaranta-ai.github.io/Alkaranta-Finanzas/" aria-label="Abrir Alkaranta Finanzas">
    <div class="glow"></div>

    <div class="icon-badge">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 17L9 11L13 15L21 7" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 7H21V13" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="eyebrow">App de finanzas personales</p>
    <h1 class="title">Alkaranta <em>Finanzas</em></h1>
    <p class="desc">Controlá tus ingresos, egresos, presupuestos y metas de ahorro en un solo lugar.</p>

    <div class="cta-row">
      <span class="cta-text">Abrir la app</span>
      <span class="arrow-circle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  </a>

  <p class="hint">Tocá la tarjeta para abrirla o instalarla en tu celular</p>
</div>

</body>
</html>
