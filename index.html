<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkaranta Studio — Silver Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #F8F9FA;
            --white: #FFFFFF;
            --silver: #C0C0C0;
            --charcoal: #374151;
            --light-grey: #E5E7EB;
            --accent: #9CA3AF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--charcoal); line-height: 1.6; }

        /* HEADER LIMPIO */
        header { 
            background: var(--white); 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--light-grey);
        }
        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 28px; 
            letter-spacing: 3px; 
            color: var(--charcoal);
            text-transform: uppercase;
        }
        header p { font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-top: 5px; }

        /* NAVEGACIÓN ESTILO APPLE */
        nav { 
            display: flex; 
            justify-content: center; 
            gap: 30px;
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px); 
            padding: 15px 0; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            border-bottom: 1px solid var(--light-grey);
        }
        .nav-btn { 
            background: none; border: none; color: var(--accent); 
            font-size: 11px; cursor: pointer; text-transform: uppercase; 
            font-weight: 600; transition: 0.3s;
        }
        .nav-btn.active { color: var(--charcoal); }
        .nav-btn i { display: block; font-size: 18px; margin-bottom: 4px; }

        /* CONTENEDOR PRINCIPAL */
        main { padding: 30px 20px; max-width: 500px; margin: 0 auto; }
        
        /* TARJETAS MINIMALISTAS */
        .card { 
            background: var(--white); 
            border-radius: 12px; 
            padding: 30px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--light-grey);
        }
        .card-title { 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--accent); 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            letter-spacing: 1px;
        }

        .balance-hero { 
            font-family: 'Playfair Display', serif; 
            font-size: 48px; 
            text-align: center; 
            color: var(--charcoal);
            margin: 10px 0;
        }

        /* FORMULARIOS ELEGANTES */
        .form-group { margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 600; margin-bottom: 8px; display: block; color: var(--accent); }
        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--light-grey); 
            border-radius: 8px; 
            font-size: 15px; 
            background: var(--bg);
            color: var(--charcoal);
        }
        .btn-silver { 
            width: 100%; padding: 16px; background: var(--charcoal); 
            color: var(--white); border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; font-size: 13px;
            transition: 0.3s;
        }
        .btn-silver:hover { background: #000; }

        /* DIAGNÓSTICO VISUAL */
        .diag-item { margin-bottom: 20px; }
        .diag-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .bar-outer { background: var(--light-grey); height: 6px; border-radius: 10px; overflow: hidden; }
        .bar-inner { height: 100%; background: var(--silver); transition: width 1s ease; }

        .advice-box { 
            background: #F9FAFB; 
            border-radius: 8px; 
            padding: 15px; 
            font-size: 13px; 
            color: #4B5563; 
            line-height: 1.6;
            border-left: 4px solid var(--silver);
        }

        .list-item { 
            display: flex; justify-content: space-between; 
            padding: 12px 0; border-bottom: 1px solid var(--light-grey); 
            font-size: 13px; 
        }
        .list-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<header>
    <h1>ALKARANTA</h1>
    <p>STUDIO SILVER EDITION</p>
</header>

<nav>
    <button class="nav-btn active" onclick="showPage('inicio')"><i class="fa-solid fa-wallet"></i>Estado</button>
    <button class="nav-btn" onclick="showPage('add')"><i class="fa-solid fa-plus"></i>Registro</button>
    <button class="nav-btn" onclick="showPage('diag')"><i class="fa-solid fa-chart-line"></i>Análisis</button>
</nav>

<main>
    <div id="page-inicio" class="page">
