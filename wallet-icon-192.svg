  <circle cx="124" cy="134" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="134" cy="134" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="144" cy="134" r="3" fill="rgba(255,255,255,0.5)"/>
