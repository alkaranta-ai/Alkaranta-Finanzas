<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- fondo negro -->
  <rect x="0" y="0" width="192" height="192" rx="42" fill="#FFFFFF"/>

  <!-- tarjeta trasera (violeta) -->
  <g transform="rotate(-8, 96, 96)">
    <rect x="28" y="62" width="136" height="88" rx="10" fill="#7C3AED"/>
  </g>

  <!-- tarjeta media (amarilla) -->
